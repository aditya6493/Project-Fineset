name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci --ignore-scripts

      - run: npx prisma generate

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test
        env:
          SKIP_ENV_VALIDATION: true
          ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

      - run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
          ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  integration:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fineset
          POSTGRES_PASSWORD: fineset
          POSTGRES_DB: fineset_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fineset"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci --ignore-scripts

      - run: npx prisma generate

      - run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://fineset:fineset@localhost:5432/fineset_test?schema=public
          DIRECT_URL: postgresql://fineset:fineset@localhost:5432/fineset_test?schema=public

      - run: npm run test:integration
        env:
          SKIP_ENV_VALIDATION: true
          ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          DATABASE_URL: postgresql://fineset:fineset@localhost:5432/fineset_test?schema=public
          DIRECT_URL: postgresql://fineset:fineset@localhost:5432/fineset_test?schema=public

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci --ignore-scripts

      - run: npx prisma generate

      - run: npx playwright install chromium

      - run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
          ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - run: npm run test:e2e
        env:
          CI: true
          SKIP_ENV_VALIDATION: true
          ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
